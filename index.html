<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolphin Registration & Products</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dolphincss@1.3.6/dolphin-css.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- १. स्टोरमा कुन पेज देखाउने भन्ने स्टेट सेट गर्ने -->
  <dolphin-store name="app" view="login"></dolphin-store>

  <!-- २. नेभिगेसन बार (पेज स्विच गर्नका लागि) -->
  <nav class="p-4 bg-white shadow flex gap-4 justify-center" data-rt-bind="store/app" data-rt-type="context">
    <button 
      data-store-click="app.view = 'login'" 
      data-rt-class="bg-blue-700:view === 'login', bg-blue-500:view !== 'login'"
      class="px-4 py-2 text-white rounded transition-colors">Login View</button>
    <button 
      data-store-click="app.view = 'register'" 
      data-rt-class="bg-green-700:view === 'register', bg-green-500:view !== 'register'"
      class="px-4 py-2 text-white rounded transition-colors">Register View</button>
  </nav>

  <!-- ३. भ्युपोर्टमा सर्त अनुसार पेज रेन्डर गर्ने -->
  <main id="viewport" data-rt-bind="store/app" data-rt-type="context" class="py-10">
    <!-- यदि view 'login' छ भने मात्र login.html लोड हुन्छ -->
    <div data-rt-if="view === 'login'" data-import="./components/login.html"></div>
    
    <!-- यदि view 'register' छ भने मात्र register.html लोड हुन्छ -->
    <div data-rt-if="view === 'register'" data-import="./components/register.html"></div>
  </main>

  <dolphin-toast></dolphin-toast>
  
  <script src="./dolphin-client.min.js" data-debug="true"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // deviceId लाई खाली राखेर options मा debug अन गरिएको छ
      const dolphin = new DolphinModule.DolphinClient('http://localhost:3000', '', { debug: true });
      dolphin.connect();
    });
  </script>
</body>
</html>
