<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md mt-6">
  <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Register</h2>
  <form class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">Full Name</label>
      <input type="text" placeholder="John Doe" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700">Email Address</label>
      <input type="email" placeholder="you@example.com" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700">Password</label>
      <input type="password" placeholder="••••••••" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500">
    </div>
    <button type="submit" class="w-full py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
      Sign Up
    </button>
  </form>
</div>
