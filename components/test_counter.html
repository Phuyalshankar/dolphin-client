<!-- components/test_counter.html -->
<template id="counter-template">
  <div class="p-6 bg-slate-900 border border-white/10 rounded-2xl text-center shadow-xl hover:border-cyan-500/30 transition-all duration-300">
    <h3 class="text-sm font-bold tracking-wider text-cyan-400 uppercase mb-2">Store: {{__storeName}}</h3>
    
    <!-- Count Display -->
    <div class="text-5xl font-extrabold text-white mb-4 animate-pulse">{{count}}</div>
    
    <!-- Status Indicator -->
    {#if isAdding}
      <p class="text-xs text-yellow-400 animate-pulse mb-4">🔄 Syncing status active...</p>
    {:else}
      <p class="text-xs text-slate-500 mb-4">✓ Idle</p>
    {/if}

    <!-- Increment and Toggle Actions -->
    <div class="flex gap-2 justify-center">
      <button 
        data-rt-click="count = count + 1" 
        class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 px-4 py-2 rounded-xl font-semibold transition-all active:scale-95 cursor-pointer">
        +1 Add
      </button>
      <button 
        data-rt-click="isAdding = !isAdding" 
        class="bg-white/5 border border-white/10 hover:bg-white/10 text-white px-3 py-2 rounded-xl font-semibold transition-all active:scale-95 cursor-pointer">
        Toggle Sync
      </button>
    </div>
  </div>
</template>

<!-- Declare a dolphin-store. Since we have a template attribute, it auto-wires and renders right here! -->
<dolphin-store name="importedCounter" template="#counter-template" count="100" isAdding="false"></dolphin-store>
